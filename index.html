<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Solar System</title>
    <style>
        /* CSS Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Information Panel */
        #info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.95), rgba(10, 10, 30, 0.95));
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            color: #fff;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.2);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        #info-panel h2 {
            color: #ffd700;
            font-size: 1.8em;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 10px;
        }

        #info-panel .info-item {
            margin: 12px 0;
            font-size: 0.95em;
            line-height: 1.4;
        }

        #info-panel .label {
            color: #88aaff;
            font-weight: bold;
        }

        #info-panel .value {
            color: #fff;
        }

        #info-panel .fact {
            margin-top: 15px;
            padding: 12px;
            background: rgba(0, 200, 255, 0.1);
            border-left: 3px solid #00d4ff;
            border-radius: 5px;
            font-style: italic;
            color: #00d4ff;
        }

        #info-panel .default-msg {
            text-align: center;
            color: #888;
            font-style: italic;
            padding: 20px 0;
        }

        /* Controls Help */
        #controls-help {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #aaa;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 0.85em;
            z-index: 1000;
        }

        #controls-help h3 {
            color: #fff;
            margin-bottom: 8px;
            font-size: 1em;
        }

        #controls-help p {
            margin: 4px 0;
        }

        #controls-help span {
            color: #ffd700;
            font-weight: bold;
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }

        #loading h1 {
            color: #ffd700;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #loading .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 215, 0, 0.3);
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Pause Button */
        #pause-btn {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.9), rgba(255, 165, 0, 0.9));
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #pause-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        #pause-btn.paused {
            background: linear-gradient(135deg, rgba(0, 255, 100, 0.9), rgba(0, 200, 50, 0.9));
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <h1>Solar System</h1>
        <div class="loader"></div>
    </div>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Information Panel -->
    <div id="info-panel">
        <h2 id="planet-name">Solar System</h2>
        <div id="info-content">
            <p class="default-msg">Click on a planet to learn more!</p>
        </div>
    </div>

    <!-- Pause Button -->
    <button id="pause-btn">Pause</button>

    <!-- Controls Help -->
    <div id="controls-help">
        <h3>Controls</h3>
        <p><span>Left-click + Drag:</span> Rotate</p>
        <p><span>Scroll:</span> Zoom</p>
        <p><span>Right-click + Drag:</span> Pan</p>
        <p><span>Click Planet:</span> View Info</p>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // =============================================================================
        // PLANET DATA
        // =============================================================================
        
        PLANETS = {
            mercury: {
                name: "Mercury",
                radius: 0.8,
                distance: 15,
                orbitalSpeed: 0.02,
                texture: "https://www.solarsystemscope.com/textures/download/2k_mercury.jpg",
                bumpMap: "https://www.solarsystemscope.com/textures/download/2k_mercury.jpg",
                rotationSpeed: 0.01,
                info: {
                    distance: "57.9 million km",
                    diameter: "4,879 km",
                    orbitalPeriod: "88 Earth days",
                    fact: "Mercury is the smallest planet in our solar system and closest to the Sun."
                }
            },
            venus: {
                name: "Venus",
                radius: 1.5,
                distance: 22,
                orbitalSpeed: 0.015,
                texture: "https://www.solarsystemscope.com/textures/download/2k_venus_surface.jpg",
                rotationSpeed: 0.005,
                info: {
                    distance: "108.2 million km",
                    diameter: "12,104 km",
                    orbitalPeriod: "225 Earth days",
                    fact: "Venus rotates backwards compared to most planets - the Sun rises in the west!"
                }
            },
            earth: {
                name: "Earth",
                radius: 1.6,
                distance: 30,
                orbitalSpeed: 0.01,
                texture: "https://www.solarsystemscope.com/textures/download/2k_earth_daymap.jpg",
                bumpMap: "https://www.solarsystemscope.com/textures/download/2k_earth_normal_map.jpg",
                specularMap: "https://www.solarsystemscope.com/textures/download/2k_earth_specular_map.jpg",
                hasClouds: true,
                rotationSpeed: 0.05,
                info: {
                    distance: "149.6 million km",
                    diameter: "12,742 km",
                    orbitalPeriod: "365.25 days",
                    fact: "Earth is the only planet known to support life - at least that we know of!"
                }
            },
            mars: {
                name: "Mars",
                radius: 1.2,
                distance: 40,
                orbitalSpeed: 0.008,
                texture: "https://www.solarsystemscope.com/textures/download/2k_mars.jpg",
                rotationSpeed: 0.04,
                info: {
                    distance: "227.9 million km",
                    diameter: "6,779 km",
                    orbitalPeriod: "687 Earth days",
                    fact: "Mars has the largest volcano in the solar system - Olympus Mons!"
                }
            },
            jupiter: {
                name: "Jupiter",
                radius: 4.5,
                distance: 60,
                orbitalSpeed: 0.004,
                texture: "https://www.solarsystemscope.com/textures/download/2k_jupiter.jpg",
                rotationSpeed: 0.08,
                hasGreatRedSpot: true,
                info: {
                    distance: "778.5 million km",
                    diameter: "139,820 km",
                    orbitalPeriod: "12 Earth years",
                    fact: "Jupiter is the largest planet - more than twice as massive as all other planets combined!"
                }
            },
            saturn: {
                name: "Saturn",
                radius: 4.0,
                distance: 80,
                orbitalSpeed: 0.003,
                texture: "https://www.solarsystemscope.com/textures/download/2k_saturn.jpg",
                rotationSpeed: 0.07,
                hasRings: true,
                ringInner: 5.5,
                ringOuter: 8.5,
                info: {
                    distance: "1.4 billion km",
                    diameter: "116,460 km",
                    orbitalPeriod: "29 Earth years",
                    fact: "Saturn's rings are made mostly of ice particles and rock debris!"
                }
            },
            uranus: {
                name: "Uranus",
                radius: 2.5,
                distance: 100,
                orbitalSpeed: 0.002,
                texture: "https://www.solarsystemscope.com/textures/download/2k_uranus.jpg",
                rotationSpeed: 0.06,
                info: {
                    distance: "2.9 billion km",
                    diameter: "50,724 km",
                    orbitalPeriod: "84 Earth years",
                    fact: "Uranus rotates on its side - like a rolling ball!"
                }
            },
            neptune: {
                name: "Neptune",
                radius: 2.4,
                distance: 120,
                orbitalSpeed: 0.001,
                texture: "https://www.solarsystemscope.com/textures/download/2k_neptune.jpg",
                rotationSpeed: 0.06,
                info: {
                    distance: "4.5 billion km",
                    diameter: "49,244 km",
                    orbitalPeriod: "165 Earth years",
                    fact: "Neptune has the strongest winds in the solar system - up to 2,100 km/h!"
                }
            }
        };

        // Sun info
        const SUN_INFO = {
            name: "The Sun",
            info: {
                distance: "0 km (Center)",
                diameter: "1,392,700 km",
                orbitalPeriod: "N/A",
                fact: "The Sun contains 99.86% of all the mass in our solar system! It's about 4.6 billion years old."
            }
        };

        // =============================================================================
        // THREE.JS SETUP
        // =============================================================================

        // Scene setup
        const scene = new THREE.Scene();
        
        // Camera
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 100, 200);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Orbit Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 20;
        controls.maxDistance = 500;

        // =============================================================================
        // CREATE SUN - Enhanced Version
        // =============================================================================

        // Sun texture loader
        const textureLoader = new THREE.TextureLoader();
        
        // Create Sun with custom shader for realistic glow
        const sunGeometry = new THREE.SphereGeometry(8, 64, 64);
        const sunMaterial = new THREE.MeshBasicMaterial({
            color: 0xffdd00,
        });
        
        // Try to load sun texture
        textureLoader.load(
            'https://www.solarsystemscope.com/textures/download/2k_sun.jpg',
            (texture) => {
                sunMaterial.map = texture;
                sunMaterial.color = new THREE.Color(0xffffff);
                sunMaterial.needsUpdate = true;
            },
            undefined,
            (error) => {
                console.log('Sun texture failed to load, using color');
            }
        );
        
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // Multiple glow layers for realistic sun effect
        const glowColors = [
            { radius: 9, color: 0xff4400, opacity: 0.4 },
            { radius: 10, color: 0xff6600, opacity: 0.25 },
            { radius: 12, color: 0xff8800, opacity: 0.15 },
            { radius: 15, color: 0xffaa00, opacity: 0.08 }
        ];
        
        glowColors.forEach(g => {
            const glowGeom = new THREE.SphereGeometry(g.radius, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: g.color,
                transparent: true,
                opacity: g.opacity,
                side: THREE.BackSide
            });
            const glowMesh = new THREE.Mesh(glowGeom, glowMat);
            scene.add(glowMesh);
        });

        // Corona effect using sprites
        const coronaCanvas = document.createElement('canvas');
        coronaCanvas.width = 256;
        coronaCanvas.height = 256;
        const ctx = coronaCanvas.getContext('2d');
        const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
        gradient.addColorStop(0, 'rgba(255, 200, 50, 1)');
        gradient.addColorStop(0.2, 'rgba(255, 150, 0, 0.8)');
        gradient.addColorStop(0.5, 'rgba(255, 100, 0, 0.3)');
        gradient.addColorStop(1, 'rgba(255, 50, 0, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 256, 256);
        
        const coronaTexture = new THREE.CanvasTexture(coronaCanvas);
        const coronaMaterial = new THREE.SpriteMaterial({ 
            map: coronaTexture, 
            transparent: true, 
            blending: THREE.AdditiveBlending 
        });
        const corona = new THREE.Sprite(coronaMaterial);
        corona.scale.set(40, 40, 1);
        sun.add(corona);

        // Sun light with better distribution
        const sunLight = new THREE.PointLight(0xfff0dd, 2.5, 400);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);

        // Ambient light for visibility
        const ambientLight = new THREE.AmbientLight(0x202040, 0.4);
        scene.add(ambientLight);

        // =============================================================================
        // CREATE STARFIELD
        // =============================================================================

        function createStarfield() {
            const starsGeometry = new THREE.BufferGeometry();
            const starCount = 2000;
            const positions = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i += 3) {
                // Random position on a large sphere
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const radius = 400 + Math.random() * 100;
                
                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i + 2] = radius * Math.cos(phi);
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 1.5,
                sizeAttenuation: true
            });
            
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }
        
        createStarfield();

        // =============================================================================
        // CREATE PLANETS - Enhanced Design
        // =============================================================================

        const planetObjects = [];
        const planetMeshes = []; // For raycasting

        // Planet-specific colors for fallback
        const planetColors = {
            mercury: 0x8c7853,
            venus: 0xe6c87a,
            earth: 0x6b93d6,
            mars: 0xc1440e,
            jupiter: 0xd8ca9d,
            saturn: 0xf4d59e,
            uranus: 0x72d6e5,
            neptune: 0x4b70dd
        };

        // Atmosphere colors
        const atmosphereColors = {
            earth: 0x4488ff,
            venus: 0xffdd88,
            jupiter: 0xffaa66,
            saturn: 0xffeecc,
            uranus: 0x88ffff,
            neptune: 0x6666ff
        };

        function createPlanet(key, data) {
            const planetGroup = new THREE.Group();
            
            // Create planet sphere with enhanced geometry (more segments for smoothness)
            const geometry = new THREE.SphereGeometry(data.radius, 64, 64);
            
            // Enhanced material with better lighting
            const material = new THREE.MeshStandardMaterial({
                color: planetColors[key] || 0x888888,
                roughness: 0.7,
                metalness: 0.1,
                flatShading: false
            });
            
            // Load texture
            textureLoader.load(
                data.texture,
                (texture) => {
                    material.map = texture;
                    material.color = new THREE.Color(0xffffff);
                    material.needsUpdate = true;
                },
                undefined,
                (error) => {
                    console.log(`Texture failed to load for ${data.name}, using color`);
                }
            );
            
            const planet = new THREE.Mesh(geometry, material);
            planet.userData = { key: key, data: data };
            planetGroup.add(planet);
            planetMeshes.push(planet);

            // Add atmosphere glow for certain planets
            if (atmosphereColors[key]) {
                const atmosGeometry = new THREE.SphereGeometry(data.radius * 1.15, 32, 32);
                const atmosMaterial = new THREE.MeshBasicMaterial({
                    color: atmosphereColors[key],
                    transparent: true,
                    opacity: 0.15,
                    side: THREE.BackSide
                });
                const atmosphere = new THREE.Mesh(atmosGeometry, atmosMaterial);
                planetGroup.add(atmosphere);
                
                // Outer glow
                const glowGeometry = new THREE.SphereGeometry(data.radius * 1.25, 32, 32);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: atmosphereColors[key],
                    transparent: true,
                    opacity: 0.08,
                    side: THREE.BackSide
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                planetGroup.add(glow);
            }
            
            // Add clouds for Earth
            if (data.hasClouds) {
                const cloudGeometry = new THREE.SphereGeometry(data.radius * 1.02, 32, 32);
                const cloudMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.3,
                    roughness: 1,
                    metalness: 0
                });
                const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
                planetGroup.add(clouds);
            }
            
            // Add Great Red Spot for Jupiter
            if (data.hasGreatRedSpot) {
                const spotGeometry = new THREE.CircleGeometry(data.radius * 0.25, 32);
                const spotMaterial = new THREE.MeshBasicMaterial({
                    color: 0x8b4513,
                    transparent: true,
                    opacity: 0.7,
                    side: THREE.DoubleSide
                });
                const spot = new THREE.Mesh(spotGeometry, spotMaterial);
                spot.position.set(data.radius * 0.6, 0, data.radius * 0.3);
                spot.rotation.x = Math.PI / 2;
                planetGroup.add(spot);
            }
            
            // Create orbit ring (dotted effect using points)
            const orbitPoints = [];
            const orbitSegments = 128;
            for (let i = 0; i <= orbitSegments; i++) {
                const angle = (i / orbitSegments) * Math.PI * 2;
                orbitPoints.push(
                    Math.cos(angle) * data.distance,
                    0,
                    Math.sin(angle) * data.distance
                );
            }
            
            const orbitGeometry = new THREE.BufferGeometry();
            orbitGeometry.setAttribute('position', new THREE.Float32BufferAttribute(orbitPoints, 3));
            const orbitMaterial = new THREE.PointsMaterial({
                color: 0x555555,
                size: 1.5,
                transparent: true,
                opacity: 0.5
            });
            const orbit = new THREE.Points(orbitGeometry, orbitMaterial);
            scene.add(orbit);
            
            // Solid orbit line (thin)
            const orbitLineGeom = new THREE.RingGeometry(data.distance - 0.05, data.distance + 0.05, 128);
            const orbitLineMat = new THREE.MeshBasicMaterial({
                color: 0x333333,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.2
            });
            const orbitLine = new THREE.Mesh(orbitLineGeom, orbitLineMat);
            orbitLine.rotation.x = -Math.PI / 2;
            scene.add(orbitLine);
            
            // Create Saturn's rings - enhanced version
            if (data.hasRings) {
                // Multiple ring bands for realistic effect
                const ringBands = [
                    { inner: 5.0, outer: 5.5, color: 0xccbb99, opacity: 0.4 },
                    { inner: 5.5, outer: 6.5, color: 0xddaa77, opacity: 0.6 },
                    { inner: 6.5, outer: 7.2, color: 0xbb8866, opacity: 0.5 },
                    { inner: 7.2, outer: 8.0, color: 0xaa7755, opacity: 0.4 },
                    { inner: 8.0, outer: 8.8, color: 0xccbbaa, opacity: 0.3 }
                ];
                
                ringBands.forEach(band => {
                    const ringGeom = new THREE.RingGeometry(band.inner, band.outer, 64);
                    const ringMat = new THREE.MeshBasicMaterial({
                        color: band.color,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: band.opacity
                    });
                    const ring = new THREE.Mesh(ringGeom, ringMat);
                    ring.rotation.x = -Math.PI / 2;
                    planetGroup.add(ring);
                });
            }
            
            // Store planet data
            const planetData = {
                group: planetGroup,
                planet: planet,
                data: data,
                angle: Math.random() * Math.PI * 2 // Random starting position
            };
            
            planetObjects.push(planetData);
            scene.add(planetGroup);
            
            return planetData;
        }

        // Create all planets
        Object.keys(PLANETS).forEach(key => {
            createPlanet(key, PLANETS[key]);
        });

        // Sun clickable mesh
        const sunMeshes = [sun];
        
        // =============================================================================
        // RAYCASTING FOR CLICK DETECTION
        // =============================================================================

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onMouseClick(event) {
            // Calculate mouse position in normalized device coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Update the raycaster
            raycaster.setFromCamera(mouse, camera);
            
            // Check for planet intersections
            const planetIntersects = raycaster.intersectObjects(planetMeshes);
            
            if (planetIntersects.length > 0) {
                const planetData = planetIntersects[0].object.userData;
                showPlanetInfo(planetData.key, planetData.data);
                return;
            }
            
            // Check for sun intersection
            const sunIntersects = raycaster.intersectObjects(sunMeshes);
            if (sunIntersects.length > 0) {
                showSunInfo();
            }
        }

        window.addEventListener('click', onMouseClick);

        // =============================================================================
        // INFORMATION PANEL
        // =============================================================================

        function showPlanetInfo(key, data) {
            const nameEl = document.getElementById('planet-name');
            const contentEl = document.getElementById('info-content');
            
            nameEl.textContent = data.name;
            
            contentEl.innerHTML = `
                <div class="info-item">
                    <span class="label">Distance from Sun:</span>
                    <span class="value">${data.info.distance}</span>
                </div>
                <div class="info-item">
                    <span class="label">Diameter:</span>
                    <span class="value">${data.info.diameter}</span>
                </div>
                <div class="info-item">
                    <span class="label">Orbital Period:</span>
                    <span class="value">${data.info.orbitalPeriod}</span>
                </div>
                <div class="fact">${data.info.fact}</div>
            `;
        }

        function showSunInfo() {
            const nameEl = document.getElementById('planet-name');
            const contentEl = document.getElementById('info-content');
            
            nameEl.textContent = SUN_INFO.name;
            
            contentEl.innerHTML = `
                <div class="info-item">
                    <span class="label">Position:</span>
                    <span class="value">${SUN_INFO.info.distance}</span>
                </div>
                <div class="info-item">
                    <span class="label">Diameter:</span>
                    <span class="value">${SUN_INFO.info.diameter}</span>
                </div>
                <div class="info-item">
                    <span class="label">Orbital Period:</span>
                    <span class="value">${SUN_INFO.info.orbitalPeriod}</span>
                </div>
                <div class="fact">${SUN_INFO.info.fact}</div>
            `;
        }

        // =============================================================================
        // ANIMATION LOOP
        // =============================================================================

        let isPaused = false;
        
        // Pause button functionality
        const pauseBtn = document.getElementById('pause-btn');
        pauseBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent click from triggering planet click
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? 'Play' : 'Pause';
            pauseBtn.classList.toggle('paused', isPaused);
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Only update planet positions if not paused
            if (!isPaused) {
                // Update planet positions
                planetObjects.forEach(obj => {
                    // Update orbital angle
                    obj.angle += obj.data.orbitalSpeed;
                    
                    // Calculate new position
                    const x = obj.data.distance * Math.cos(obj.angle);
                    const z = obj.data.distance * Math.sin(obj.angle);
                    
                    obj.group.position.set(x, 0, z);
                    
                    // Rotate planet on axis
                    obj.planet.rotation.y += obj.data.rotationSpeed;
                });
                
                // Rotate sun
                sun.rotation.y += 0.002;
            }
            
            // Update controls
            controls.update();
            
            // Render
            renderer.render(scene, camera);
        }

        // =============================================================================
        // WINDOW RESIZE HANDLER
        // =============================================================================

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // =============================================================================
        // START
        // =============================================================================

        // Hide loading screen after a short delay
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 1500);

        // Start animation
        animate();
    </script>
</body>
</html>
