<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Solar System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <h1>Solar System</h1>
        <div class="loader"></div>
    </div>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Title Boxes -->
    <div class="title-box performance">Performance Task in Physical Science</div>
    <div class="title-box heliocentric">Heliocentric Model</div>

    <!-- Information Panel -->
    <div id="info-panel">
        <h2 id="planet-name">Solar System</h2>
        <div id="info-content">
            <p class="default-msg">Click on a planet to learn more!</p>
        </div>
    </div>

    <!-- Pause Button -->
    <button id="pause-btn">Pause</button>

    <!-- Controls Help -->
    <div id="controls-help">
        <h3>Controls</h3>
        <p><span>Left-click + Drag:</span> Rotate</p>
        <p><span>Scroll:</span> Zoom</p>
        <p><span>Right-click + Drag:</span> Pan</p>
        <p><span>Click Planet:</span> View Info</p>
    </div>

    <!-- Planet Labels -->
    <div id="label-sun" class="planet-label sun">The Sun</div>
    <div id="label-mercury" class="planet-label mercury">Mercury</div>
    <div id="label-venus" class="planet-label venus">Venus</div>
    <div id="label-earth" class="planet-label earth">Earth</div>
    <div id="label-mars" class="planet-label mars">Mars</div>
    <div id="label-jupiter" class="planet-label jupiter">Jupiter</div>
    <div id="label-saturn" class="planet-label saturn">Saturn</div>
    <div id="label-uranus" class="planet-label uranus">Uranus</div>
    <div id="label-neptune" class="planet-label neptune">Neptune</div>
    <div id="label-moon" class="planet-label moon">Moon</div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
